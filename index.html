<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1024, initial-scale=1.0">
<title>Couveuse Automatique — ESP32-P4</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { width: 1024px; height: 600px; overflow: hidden; background: #0a0c0f; font-family: 'Barlow', sans-serif; }
  #root { width: 1024px; height: 600px; overflow: hidden; }

  /* Tweaks panel */
  .tweaks-panel {
    position: fixed; bottom: 20px; right: 20px; width: 260px;
    background: #1a1e24; border: 1px solid #2a3040;
    border-radius: 8px; padding: 14px; z-index: 9999;
    font-family: 'Barlow', sans-serif; font-size: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    display: none;
  }
  .tweaks-panel.visible { display: block; }
  .tweaks-panel h4 { color: #e8a838; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
  .tweaks-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; color: #8a9ab0; }
  .tweaks-row label { font-size: 11px; }
  .tweaks-row input[type=range] { width: 100px; accent-color: #e8a838; }
  .tweaks-row select { background: #0f1318; color: #c0ccd8; border: 1px solid #2a3040; border-radius: 4px; padding: 2px 6px; font-size: 11px; }
  .tweaks-toggle { display: flex; gap: 4px; }
  .tweaks-toggle button { padding: 3px 8px; border-radius: 4px; border: 1px solid #2a3040; background: #0f1318; color: #8a9ab0; cursor: pointer; font-size: 10px; }
  .tweaks-toggle button.active { background: #e8a838; color: #0a0c0f; border-color: #e8a838; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "dark",
  "accentColor": "#e8a838",
  "animateSensors": true,
  "showCO2": true
}/*EDITMODE-END*/;

// ─── COLOR PALETTE ───────────────────────────────────────────────
const C = {
  bg:       '#0a0c0f',
  bgPanel:  '#0f1318',
  bgCard:   '#141920',
  border:   '#1e2630',
  border2:  '#2a3848',
  text:     '#d8e4f0',
  textDim:  '#5a6e82',
  textMid:  '#8a9ab0',
  accent:   '#e8a838',
  accentDim:'#a07020',
  green:    '#38c878',
  red:      '#e83838',
  blue:     '#3898e8',
  teal:     '#38c8c0',
  orange:   '#e87828',
  yellow:   '#e8d838',
};

// ─── ICONS (SVG inline) ───────────────────────────────────────────
const Icon = ({ name, size=20, color=C.textMid }) => {
  const icons = {
    flame: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 8 6 8 11c0 2.2 1.8 4 4 4s4-1.8 4-4c0-1-.3-2-.8-2.8C14.5 9.5 14 11 12 11c0 0 1-3 0-5 0 0-1 2-2 3.5C9.4 10.7 9 11.8 9 13c0 1.7 1.3 3 3 3s3-1.3 3-3c0-3-3-11-3-11z" fill={color}/></svg>,
    droplet: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M12 2L5.5 9.5C4 11.2 3 13.2 3 15c0 5 4 8 9 8s9-3 9-8c0-1.8-1-3.8-2.5-5.5L12 2z" fill={color}/></svg>,
    wind: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M3 8h11c1.7 0 3-1.3 3-3s-1.3-3-3-3-3 1.3-3 3M3 12h14c1.7 0 3 1.3 3 3s-1.3 3-3 3M3 16h7c1.7 0 3 1.3 3 3" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
    egg: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><ellipse cx="12" cy="13" rx="7" ry="9" fill={color}/></svg>,
    fan: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="2" fill={color}/><path d="M12 2c0 0 2 4 2 7-1 0-2-1-2-1s-1 1-2 1c0-3 2-7 2-7zM22 12c0 0-4 2-7 2 0-1 1-2 1-2s-1-1-1-2c3 0 7 2 7 2zM12 22c0 0-2-4-2-7 1 0 2 1 2 1s1-1 2-1c0 3-2 7-2 7zM2 12c0 0 4-2 7-2 0 1-1 2-1 2s1 1 1 2c-3 0-7-2-7-2z" fill={color}/></svg>,
    gear: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke={color} strokeWidth="2"/><path d="M12 1v3M12 20v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M1 12h3M20 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
    water: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M12 2C6 8 4 12 4 15a8 8 0 0016 0c0-3-2-7-8-13z" fill={color}/><path d="M12 22v-4M8 18l2-2M16 18l-2-2" stroke="#0a0c0f" strokeWidth="1.5" strokeLinecap="round"/></svg>,
    door: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><rect x="3" y="2" width="18" height="20" rx="1" stroke={color} strokeWidth="2"/><circle cx="16" cy="12" r="1.5" fill={color}/></svg>,
    motor: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="14" height="10" rx="2" stroke={color} strokeWidth="2"/><path d="M16 10h4l2 2-2 2h-4" stroke={color} strokeWidth="2" strokeLinecap="round"/><circle cx="9" cy="12" r="2" fill={color}/></svg>,
    chart: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><polyline points="2,18 8,10 12,14 16,6 22,10" stroke={color} strokeWidth="2" fill="none" strokeLinecap="round"/></svg>,
    alert: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M12 2L2 22h20L12 2z" stroke={color} strokeWidth="2" strokeLinejoin="round"/><path d="M12 9v5M12 17v1" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
    wifi: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
    lock: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><rect x="3" y="11" width="18" height="11" rx="2" stroke={color} strokeWidth="2"/><path d="M7 11V7a5 5 0 0110 0v4" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
    light: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="4" stroke={color} strokeWidth="2"/><path d="M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
    stats: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><rect x="2" y="16" width="4" height="6" fill={color}/><rect x="9" y="10" width="4" height="12" fill={color}/><rect x="16" y="4" width="4" height="18" fill={color}/></svg>,
    menu: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke={color} strokeWidth="2"/><path d="M8 12h8M12 8l4 4-4 4" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    back: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    check: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/></svg>,
    trappe: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><rect x="2" y="6" width="20" height="12" rx="2" stroke={color} strokeWidth="2"/><path d="M2 12h20M12 6v12" stroke={color} strokeWidth="1.5" strokeDasharray="3 2"/></svg>,
    calendar: <svg width={size} height={size} viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="18" rx="2" stroke={color} strokeWidth="2"/><path d="M16 2v4M8 2v4M3 10h18" stroke={color} strokeWidth="2" strokeLinecap="round"/></svg>,
  };
  return icons[name] || <svg width={size} height={size} viewBox="0 0 24 24"/>;
};

// ─── ANIMATED FAN ────────────────────────────────────────────────
const AnimatedFan = ({ speed=0, size=32, color=C.teal, running=true }) => {
  const duration = running && speed > 0 ? Math.max(0.3, 2 - speed/60) : 99999;
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" style={{overflow:'visible'}}>
      {/* Glow ring when running */}
      {running && speed > 0 && (
        <circle cx="24" cy="24" r="20" fill="none" stroke={color} strokeWidth="1"
          opacity="0.15" style={{filter:`drop-shadow(0 0 6px ${color})`}}/>
      )}
      {/* Spinning blades */}
      <g style={{transformOrigin:'24px 24px', animation:running && speed>0 ? `spinFan ${duration}s linear infinite` : 'none'}}>
        {/* 4 blades */}
        {[0,90,180,270].map(angle => (
          <g key={angle} style={{transformOrigin:'24px 24px', transform:`rotate(${angle}deg)`}}>
            <path d="M24 24 C20 14 14 10 18 6 C22 2 28 8 24 24Z"
              fill={color} opacity="0.85"
              style={{filter: running && speed>0 ? `drop-shadow(0 0 3px ${color})` : 'none'}}/>
          </g>
        ))}
        {/* Center hub */}
        <circle cx="24" cy="24" r="4" fill={color} style={{filter:`drop-shadow(0 0 4px ${color}88)`}}/>
        <circle cx="24" cy="24" r="2" fill="#0a0c0f"/>
      </g>
      {/* Speed arc */}
      {speed > 0 && (() => {
        const r=22, circ=2*Math.PI*r, arc=(speed/100)*circ*0.75;
        return <circle cx="24" cy="24" r={r} fill="none" stroke={color} strokeWidth="2"
          strokeDasharray={`${arc} ${circ}`} strokeDashoffset={circ*0.125}
          opacity="0.3" strokeLinecap="round"
          style={{transform:'rotate(135deg)',transformOrigin:'24px 24px'}}/>;
      })()}
    </svg>
  );
};

// ─── ANIMATED TRAPPE ─────────────────────────────────────────────
const AnimatedTrappe = ({ open=false, size=48, color=C.blue }) => {
  const angle = open ? -70 : 0;
  return (
    <svg width={size} height={size} viewBox="0 0 48 48" style={{overflow:'visible'}}>
      {/* Frame */}
      <rect x="4" y="10" width="40" height="28" rx="3" fill="none" stroke={color} strokeWidth="1.5" opacity="0.4"/>
      {/* Hinge dot left */}
      <circle cx="8" cy="24" r="2" fill={color} opacity="0.7"/>
      {/* Top flap */}
      <g style={{transformOrigin:'8px 18px', transform:`rotate(${open?-angle:0}deg)`, transition:'transform 0.6s cubic-bezier(.4,2,.6,1)'}}>
        <rect x="8" y="11" width="36" height="13" rx="2" fill={color} opacity="0.25" stroke={color} strokeWidth="1" />
        <line x1="16" y1="17" x2="38" y2="17" stroke={color} strokeWidth="1" opacity="0.5"/>
        <line x1="23" y1="13" x2="23" y2="23" stroke={color} strokeWidth="0.8" opacity="0.4"/>
      </g>
      {/* Bottom flap */}
      <g style={{transformOrigin:'8px 30px', transform:`rotate(${open?angle:0}deg)`, transition:'transform 0.6s cubic-bezier(.4,2,.6,1)'}}>
        <rect x="8" y="24" width="36" height="13" rx="2" fill={color} opacity="0.25" stroke={color} strokeWidth="1"/>
        <line x1="16" y1="30" x2="38" y2="30" stroke={color} strokeWidth="1" opacity="0.5"/>
        <line x1="31" y1="25" x2="31" y2="36" stroke={color} strokeWidth="0.8" opacity="0.4"/>
      </g>
      {/* Air flow arrows (visible when open) */}
      {open && [16,24,32].map(x=>(
        <g key={x} style={{animation:'airflow 1.2s ease-in-out infinite', animationDelay:`${x*0.03}s`}}>
          <path d={`M${x} 42 L${x} 46`} stroke={color} strokeWidth="1.5" strokeLinecap="round" opacity="0.6"/>
          <path d={`M${x-2} 44 L${x} 46 L${x+2} 44`} fill="none" stroke={color} strokeWidth="1.2" strokeLinecap="round" opacity="0.6"/>
        </g>
      ))}
    </svg>
  );
};

// ─── ANIMATED FLAME ──────────────────────────────────────────────
const AnimatedFlame = ({ active=false, size=28 }) => (
  <svg width={size} height={size} viewBox="0 0 32 32" style={{overflow:'visible'}}>
    {active && <ellipse cx="16" cy="26" rx="8" ry="3" fill={C.orange} opacity="0.15"
      style={{animation:'flamePulse 0.8s ease-in-out infinite alternate'}}/>}
    <g style={active ? {animation:'flameWobble 0.6s ease-in-out infinite alternate', transformOrigin:'16px 24px'} : {}}>
      <path d="M16 4 C16 4 10 10 10 17 C10 21 13 24 16 24 C19 24 22 21 22 17 C22 10 16 4 16 4Z"
        fill={active ? C.orange : C.textDim}
        style={active ? {filter:`drop-shadow(0 0 8px ${C.orange})`} : {}}/>
      <path d="M16 14 C16 14 13 17 13 20 C13 22 14.5 23 16 23 C17.5 23 19 22 19 20 C19 17 16 14 16 14Z"
        fill={active ? C.yellow : '#2a3848'} opacity="0.9"/>
    </g>
  </svg>
);

// ─── ANIMATED DROPLET ────────────────────────────────────────────
const AnimatedDroplet = ({ active=false, size=28 }) => (
  <svg width={size} height={size} viewBox="0 0 32 32" style={{overflow:'visible'}}>
    {active && [0,1,2].map(i=>(
      <circle key={i} cx={10+i*6} cy="28" r="2" fill={C.blue} opacity="0"
        style={{animation:`dropFall 1.4s ease-in infinite`, animationDelay:`${i*0.35}s`}}/>
    ))}
    <path d="M16 4 C10 11 7 16 7 20 C7 25 11 29 16 29 C21 29 25 25 25 20 C25 16 22 11 16 4Z"
      fill={active ? C.blue : C.textDim}
      style={active ? {filter:`drop-shadow(0 0 8px ${C.blue}88)`, animation:'dropPulse 1.5s ease-in-out infinite alternate'} : {}}/>
    <ellipse cx="13" cy="17" rx="2.5" ry="4" fill="white" opacity="0.15" transform="rotate(-20 13 17)"/>
  </svg>
);

// ─── GAUGE RING ───────────────────────────────────────────────────
const GaugeRing = ({ value, min, max, color, size=110, strokeW=8 }) => {
  const r = (size - strokeW*2) / 2;
  const circ = 2 * Math.PI * r;
  const pct = Math.min(1, Math.max(0, (value - min) / (max - min)));
  const arcLen = pct * circ * 0.75;
  const offset = circ * 0.125;
  return (
    <svg width={size} height={size} style={{transform:'rotate(135deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e2630" strokeWidth={strokeW} strokeDasharray={`${circ*0.75} ${circ*0.25}`} strokeDashoffset={-offset} strokeLinecap="round"/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={strokeW} strokeDasharray={`${arcLen} ${circ-arcLen}`} strokeDashoffset={-offset} strokeLinecap="round" style={{filter:`drop-shadow(0 0 6px ${color}88)`}}/>
    </svg>
  );
};

// ─── MINI SPARKLINE ───────────────────────────────────────────────
const Sparkline = ({ data, color, w=80, h=28 }) => {
  if (!data || data.length < 2) return null;
  const mn = Math.min(...data), mx = Math.max(...data);
  const rng = mx - mn || 1;
  const pts = data.map((v,i) => `${(i/(data.length-1))*w},${h - ((v-mn)/rng)*h}`).join(' ');
  return (
    <svg width={w} height={h} style={{overflow:'visible'}}>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{filter:`drop-shadow(0 0 3px ${color}66)`}}/>
    </svg>
  );
};

// ─── SENSOR CARD ─────────────────────────────────────────────────
const SensorCard = ({ icon, label, value, unit, min, max, color, history, subLabel, subValue, alarm }) => {
  const pct = Math.min(100, Math.max(0, ((value-min)/(max-min))*100));
  return (
    <div style={{
      background: C.bgCard, border: `1px solid ${alarm ? color+'66' : C.border}`,
      borderRadius: 10, padding: '14px 16px', flex: 1,
      boxShadow: alarm ? `0 0 20px ${color}22, inset 0 0 20px ${color}08` : 'none',
      position: 'relative', overflow: 'hidden',
    }}>
      {alarm && <div style={{position:'absolute',top:0,left:0,right:0,height:2,background:`linear-gradient(90deg,transparent,${color},transparent)`,animation:'pulse 1.5s infinite'}}/>}
      <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:10}}>
        <div>
          <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
            <Icon name={icon} size={16} color={color}/>
            <span style={{color:C.textDim,fontSize:11,letterSpacing:2,textTransform:'uppercase',fontFamily:'Barlow Condensed'}}>{label}</span>
          </div>
          <div style={{display:'flex',alignItems:'baseline',gap:4}}>
            <span style={{fontFamily:'Share Tech Mono',fontSize:44,color:color,lineHeight:1,textShadow:`0 0 20px ${color}88`}}>{typeof value==='number'?value.toFixed(value>100?0:1):value}</span>
            <span style={{fontFamily:'Barlow Condensed',fontSize:18,color:C.textDim,fontWeight:600}}>{unit}</span>
          </div>
        </div>
        <div style={{position:'relative',width:110,height:110,marginTop:-8}}>
          <GaugeRing value={value} min={min} max={max} color={color} size={110}/>
          <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',marginTop:8}}>
            <span style={{fontFamily:'Share Tech Mono',fontSize:11,color:C.textDim}}>{min}</span>
            <span style={{fontFamily:'Share Tech Mono',fontSize:9,color:C.textDim,marginTop:2}}>{max}</span>
          </div>
        </div>
      </div>
      {subLabel && <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <span style={{fontSize:10,color:C.textDim,letterSpacing:1}}>{subLabel}</span>
        <span style={{fontFamily:'Share Tech Mono',fontSize:12,color:C.textMid}}>{subValue}</span>
      </div>}
      <div style={{position:'relative',marginTop:4}}>
        <LiveChart data={history} color={color} w={260} h={38} target={(min+max)/2} targetLabel={label==='CO2'?`${max}ppm`:`${(min+max)/2}${unit}`}/>
        {label==='CO2' && <CO2Bubbles co2={value} active={true}/>}
      </div>
      <div style={{marginTop:6,display:'flex',alignItems:'center',gap:8}}>
        <div style={{flex:1,height:3,background:C.border,borderRadius:2,overflow:'hidden'}}>
          <div style={{height:'100%',width:`${pct}%`,background:`linear-gradient(90deg,${color}88,${color})`,borderRadius:2,transition:'width 0.8s ease',boxShadow:`0 0 8px ${color}`}}/>
        </div>
        <span style={{fontFamily:'Share Tech Mono',fontSize:9,color:alarm?color:C.textDim,whiteSpace:'nowrap'}}>
          {label==='CO2'?`<${max}${unit}`:`cible ${(min+max)/2}${unit}`}
        </span>
      </div>
    </div>
  );
};

// ─── STATUS BAR ──────────────────────────────────────────────────
const StatusBar = ({ heat, humid, water, door, system, fan }) => {
  const items = [
    { label:'CHAUFFAGE', active:heat,  color:C.orange, anim:<AnimatedFlame active={heat} size={22}/> },
    { label:'HUMIDIF.',  active:humid, color:C.blue,   anim:<AnimatedDroplet active={humid} size={22}/> },
    { label:'EAU',       active:!water,color:C.teal,   icon:'water' },
    { label:'PORTE',     active:!door, color:C.green,  icon:'door' },
    { label:'SYSTEME',   active:system,color:C.green,  icon:'check' },
  ];
  return (
    <div style={{display:'flex',gap:4,padding:'4px 10px',background:C.bgPanel,borderTop:`1px solid ${C.border}`,height:44}}>
      {items.map(it => (
        <div key={it.label} style={{
          flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:5,
          background: it.active ? `${it.color}18` : `${C.red}18`,
          border:`1px solid ${it.active ? it.color+'44' : C.red+'44'}`,
          borderRadius:6,padding:'3px 6px',
        }}>
          {it.anim
            ? <div style={{width:22,height:22,display:'flex',alignItems:'center',justifyContent:'center'}}>{it.anim}</div>
            : <div style={{width:6,height:6,borderRadius:'50%',background:it.active?it.color:C.red,boxShadow:`0 0 6px ${it.active?it.color:C.red}`}}/>
          }
          <span style={{fontSize:9,letterSpacing:1.5,color:it.active?it.color:C.red,fontFamily:'Barlow Condensed',fontWeight:700}}>{it.label}</span>
        </div>
      ))}
      {/* Ventilateur animé dans la barre d'état */}
      <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',gap:6,background:`${C.teal}18`,border:`1px solid ${C.teal}44`,borderRadius:6,padding:'3px 6px'}}>
        <AnimatedFan speed={fan} size={22} color={C.teal} running={fan>0}/>
        <span style={{fontSize:9,letterSpacing:1.5,color:C.teal,fontFamily:'Barlow Condensed',fontWeight:700}}>{fan}%</span>
      </div>
    </div>
  );
};

// ─── SHORTCUT PANEL (bottom right) ───────────────────────────────

// ─── SETTINGS SCREEN ─────────────────────────────────────────────

  const [tab, setTab] = React.useState('regulation');
  const [pinInput, setPinInput] = React.useState('');
  const [unlocked, setUnlocked] = React.useState(false);
  const send = sendCmd || (()=>{});

  // Appliquer les cibles vers l'ESP32
  const applyParams = (p) => {
    send({temp: p.tempTarget, hum: p.humTarget, co2: p.co2Max});

    send({incub_cmd:'save', duree: p.duration, eclos_day: p.eclosionDay});

  const tabs = [
    {id:'regulation',label:'RÉGULATION'},

              </div>
            </Row>
            <Row label="Alerte CO2 dépassé">
              <div onClick={()=>setParams(p=>({...p,alertCO2:!p.alertCO2}))} style={{width:44,height:24,borderRadius:12,background:params.alertCO2?C.accent:C.border,position:'relative',cursor:'pointer',transition:'background 0.2s'}}>

              <select value={params.screensaver} onChange={e=>setParams(p=>({...p,screensaver:e.target.value}))} style={{background:C.bgCard,color:C.text,border:`1px solid ${C.border}`,borderRadius:6,padding:'4px 8px',fontFamily:'Barlow Condensed',fontSize:12}}>

              </select>

          </div>
        ) : (
          <div>
            <Row label="Firmware"><span style={{fontFamily:'Share Tech Mono',fontSize:12,color:C.textMid}}>v3.7 / 2025</span></Row>
            <Row label="Uptime"><span style={{fontFamily:'Share Tech Mono',fontSize:12,color:C.textMid}}>3j 14h 22m</span></Row>
            <Row label="Mémoire libre"><span style={{fontFamily:'Share Tech Mono',fontSize:12,color:C.textMid}}>218 Ko</span></Row>
            <Row label="I2C SHT45"><span style={{fontSize:11,color:C.green}}>● OK (0x44)</span></Row>

            <Row label="PCA9685"><span style={{fontSize:11,color:C.green}}>● OK (0x40)</span></Row>
          </div>
        )}

// ─── MOTOR SCREEN ────────────────────────────────────────────────
const MotorScreen = ({ onBack, state }) => {
  const [dir, setDir] = React.useState(state.motorDir || 'STOP');
  const [running, setRunning] = React.useState(false);
  const pos = dir==='LEFT' ? 20 : dir==='RIGHT' ? 80 : 50;
  const send = state.sendCmd || (()=>{});

  // Sync direction with live ESP32 state when not actively running manual command
  React.useEffect(() => {
    if (!running) setDir(state.motorDir || 'STOP');
  }, [state.motorDir, running]);

  const startMotor = (d) => {
    setDir(d); setRunning(true);
    send({motor_cmd: d==='LEFT' ? 'go_left' : 'go_right'});
    setTimeout(()=>setRunning(false), 3000);
  };

  // Compute elapsed since last turn
  const dernierLabel = (() => {
    const epoch = state.lastTurnEpoch || 0;
    if (!epoch) return '--:--';
    const nowSec = Math.floor(Date.now() / 1000);
    const elapsed = nowSec - epoch;
    if (elapsed < 0 || elapsed > 86400 * 30) return '--:--';
    const h = Math.floor(elapsed / 3600);
    const m = Math.floor((elapsed % 3600) / 60);
    return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  })();

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:`1px solid ${C.border}`,background:C.bgPanel}}>

          <Icon name="back" size={18} color={C.accent}/><span style={{fontFamily:'Barlow Condensed',fontSize:12,letterSpacing:2}}>RETOUR</span>
        </button>
        <span style={{fontFamily:'Barlow Condensed',fontSize:16,color:C.text,letterSpacing:3,fontWeight:700}}>MOTEUR RETOURNEMENT</span>

            <span style={{fontSize:10,color:C.textDim,letterSpacing:2}}>PLATEAU RETOURNEMENT</span>
            <div style={{position:'relative',width:220,height:130}}>
              {/* Support bars */}
              <div style={{position:'absolute',top:'50%',left:8,width:6,height:70,background:C.border,borderRadius:3,transform:'translateY(-50%)'}}/>

                position:'absolute',top:'50%',left:'50%',
                width:190,height:64,
                transform:`translate(-50%,-50%) rotate(${running?(dir==='LEFT'?-25:25):0}deg)`,
                background:`linear-gradient(135deg,${C.bgCard},${C.bgPanel})`,
                border:`2px solid ${running?C.accent:C.border}`,borderRadius:12,
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                transition:'transform 0.7s cubic-bezier(.4,2,.6,1)',
                boxShadow: running ? `0 0 18px ${C.accent}44` : 'none',
              }}>
                {[0,1,2,3,4,5,6].map(i=>(
                  <div key={i} style={{

              {/* Motion arrows */}
              {running && <>
                <div style={{position:'absolute',top:'50%',left:20,transform:'translateY(-50%)',opacity:dir==='LEFT'?1:0.15,transition:'opacity 0.3s'}}>

// ─── STATS SCREEN ────────────────────────────────────────────────
const StatsScreen = ({ onBack, state }) => {
  const [tab, setTab] = React.useState('bilan');
  const alarms = state.alarmLog && state.alarmLog.length > 0
    ? state.alarmLog.map(a => ({type:a.type, time:a.time, val:a.val !== undefined ? String(a.val.toFixed(1)) : '—', active:a.on}))
    : [];

  // Format epoch seconds → DD/MM/YYYY
  const fmtDate = (epochSec, offsetDays=0) => {
    if (!epochSec) return '--/--/----';
    const d = new Date((epochSec + offsetDays * 86400) * 1000);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  };
  const ep = state.incubEpoch || 0;
  const td = state.totalDays || 21;
  const ed = state.eclosDay  || 18;
  const curDay = state.day || 0;
  const SimpleGraph = ({ data, color, label, unit }) => {
    const mn=Math.min(...data), mx=Math.max(...data), rng=mx-mn||1;
    const w=240, h=80;
    const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-10)+5}`).join(' ');
    return (
      <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
        <div style={{display:'flex',justifyContent:'space-between',marginBottom:6}}>
          <span style={{fontSize:10,color:C.textDim,letterSpacing:1}}>{label}</span>
          <span style={{fontFamily:'Share Tech Mono',fontSize:11,color}}>min:{mn.toFixed(1)} max:{mx.toFixed(1)}{unit}</span>
        </div>
        <svg width={w} height={h} style={{overflow:'visible'}}>
          <defs><linearGradient id={`g${label}`} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
          <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#g${label})`}/>
          <polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
        </svg>
      </div>
    );
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'100%'}}>
      <div style={{display:'flex',alignItems:'center',gap:12,padding:'12px 16px',borderBottom:`1px solid ${C.border}`,background:C.bgPanel}}>
        <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:6,color:C.accent}}>
          <Icon name="back" size={18} color={C.accent}/><span style={{fontFamily:'Barlow Condensed',fontSize:12,letterSpacing:2}}>RETOUR</span>
        </button>
        <span style={{fontFamily:'Barlow Condensed',fontSize:16,color:C.text,letterSpacing:3,fontWeight:700}}>STATISTIQUES</span>
        <div style={{display:'flex',gap:0,marginLeft:'auto'}}>
          {['bilan','graphes','alarmes'].map(t=>(
            <button key={t} onClick={()=>setTab(t)} style={{padding:'4px 14px',background:'none',border:'none',cursor:'pointer',fontFamily:'Barlow Condensed',fontSize:11,letterSpacing:2,color:tab===t?C.accent:C.textDim,borderBottom:tab===t?`2px solid ${C.accent}`:'2px solid transparent',textTransform:'uppercase'}}>{t}</button>
          ))}
        </div>
      </div>
      <div style={{flex:1,overflowY:'auto',padding:16}}>
        {tab==='bilan' && (
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:10}}>
            {[
              {label:'JOUR INCUBATION',val:`J${curDay}`,sub:`/ ${td} jours`,color:C.accent},
              {label:'RETOURNEMENTS',val:`${state.turnCount}×`,sub:'depuis début',color:C.orange},
              {label:'TAUX CHAUFFE',val:state.heatPct>0?`${state.heatPct.toFixed(1)}%`:'--',sub:'du temps',color:C.orange},
              {label:'TAUX HUMIDIF.',val:state.humidPct>0?`${state.humidPct.toFixed(1)}%`:'--',sub:'du temps',color:C.blue},
              {label:'T° MINIMUM',val:state.tempMin>0?`${state.tempMin.toFixed(1)}°C`:'--',sub:'enregistrée',color:C.teal},
              {label:'T° MAXIMUM',val:state.tempMax>0?`${state.tempMax.toFixed(1)}°C`:'--',sub:'enregistrée',color:C.red},
              {label:'HR MINIMUM',val:state.humMin>0?`${state.humMin.toFixed(1)}%`:'--',sub:'enregistrée',color:C.blue},
              {label:'HR MAXIMUM',val:state.humMax>0?`${state.humMax.toFixed(1)}%`:'--',sub:'enregistrée',color:C.teal},
              {label:'CO2 MINIMUM',val:state.co2Min>0?`${state.co2Min}ppm`:'--',sub:'enregistré',color:C.green},
              {label:'CO2 MAXIMUM',val:state.co2MaxStat>0?`${state.co2MaxStat}ppm`:'--',sub:'enregistré',color:C.yellow},
              {label:'MIRAGE J7',val:fmtDate(ep,6).slice(0,5),sub:curDay>7?'Passé':'À venir',color:curDay>7?C.textDim:C.green},
              {label:'ÉCLOSION PRÉVUE',val:fmtDate(ep,td-1).slice(0,5),sub:`dans ${state.daysLeft}j`,color:C.accent},
            ].map(s=>(
              <div key={s.label} style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:'10px 12px'}}>
                <div style={{fontSize:8,color:C.textDim,letterSpacing:1,marginBottom:4}}>{s.label}</div>
                <div style={{fontFamily:'Share Tech Mono',fontSize:20,color:s.color}}>{s.val}</div>

              </div>
            ))}
          </div>
        )}
        {tab==='graphes' && (
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            <SimpleGraph data={state.tempHistory} color={C.orange} label="TEMPÉRATURE" unit="°C"/>
            <SimpleGraph data={state.humHistory} color={C.blue} label="HUMIDITÉ" unit="%"/>
            <SimpleGraph data={state.co2History} color={C.teal} label="CO2" unit="ppm"/>
            <div style={{background:C.bgCard,border:`1px solid ${C.border}`,borderRadius:8,padding:12}}>
              <div style={{fontSize:10,color:C.textDim,letterSpacing:1,marginBottom:8}}>DURÉES ACTIONNEURS</div>
              {[
                {label:'Chauffage',val:state.heatTime,color:C.orange,pct:Math.round(state.heatPct)||0},
                {label:'Humidificateur',val:state.humidTime,color:C.blue,pct:Math.round(state.humidPct)||0},
                {label:'Ventilateur',val:'--:--:--',color:C.teal,pct:state.fan||0},
              ].map(r=>(
                <div key={r.label} style={{marginBottom:10}}>
                  <div style={{display:'flex',justifyContent:'space-between',marginBottom:3}}>
                    <span style={{fontSize:10,color:C.textMid}}>{r.label}</span>
                    <span style={{fontFamily:'Share Tech Mono',fontSize:10,color:r.color}}>{r.val}</span>
                  </div>
                  <div style={{height:4,background:C.border,borderRadius:2}}>
                    <div style={{height:'100%',width:`${r.pct}%`,background:r.color,borderRadius:2}}/>
                  </div>
                </div>
              ))}
            </div>
          </div>
        )}
        {tab==='alarmes' && (
          <div style={{display:'flex',flexDirection:'column',gap:6}}>
            {alarms.length === 0
              ? <div style={{padding:'10px 14px',background:`${C.green}10`,border:`1px solid ${C.green}33`,borderRadius:8,display:'flex',gap:8,alignItems:'center'}}>
                  <Icon name="check" size={14} color={C.green}/>
                  <span style={{fontSize:11,color:C.green}}>Aucune alarme enregistrée — système nominal</span>
                </div>
              : alarms.map((a,i)=>(
              <div key={i} style={{display:'flex',alignItems:'center',gap:12,background:C.bgCard,border:`1px solid ${a.active?C.red+'44':C.border}`,borderRadius:8,padding:'10px 14px'}}>
                <Icon name="alert" size={16} color={a.active?C.red:C.textDim}/>
                <span style={{fontFamily:'Barlow Condensed',fontSize:13,color:a.active?C.red:C.text,letterSpacing:1,minWidth:100}}>{a.type}</span>
                <span style={{fontFamily:'Share Tech Mono',fontSize:11,color:C.textDim,minWidth:60}}>{a.time}</span>
                <span style={{fontFamily:'Share Tech Mono',fontSize:12,color:C.textMid}}>{a.val}</span>
                <div style={{marginLeft:'auto',fontSize:9,color:a.active?C.red:C.green}}>{a.active?'● ACTIF':'● RÉSOLU'}</div>
              </div>
            ))}
            {alarms.length > 0 && !alarms.some(a=>a.active) &&
              <div style={{marginTop:4,padding:'10px 14px',background:`${C.green}10`,border:`1px solid ${C.green}33`,borderRadius:8,display:'flex',gap:8,alignItems:'center'}}>
                <Icon name="check" size={14} color={C.green}/>
                <span style={{fontSize:11,color:C.green}}>Aucune alarme active — système nominal</span>
              </div>
            }
          </div>
        )}
      </div>
    </div>
  );
};

// ─── ANIMATED CO2 BUBBLES ────────────────────────────────────────
const CO2Bubbles = ({ co2, active }) => {
  const count = Math.min(8, Math.floor(co2 / 250));
  return (
    <svg width="60" height="40" style={{position:'absolute',bottom:0,right:4,pointerEvents:'none'}}>
      {Array.from({length:count},(_,i)=>(
        <circle key={i}
          cx={8+i*7} cy={20} r={2+i%3}
          fill={co2>1500?C.yellow:C.teal} opacity="0"
          style={{animation:`bubble ${1.2+i*0.3}s ease-in infinite`, animationDelay:`${i*0.18}s`}}/>
      ))}
    </svg>
  );
};

// ─── LIVE MINI CHART ─────────────────────────────────────────────
const LiveChart = ({ data, color, w=260, h=48, target, targetLabel }) => {
  if (!data || data.length < 2) return null;
  const mn = Math.min(...data)-0.5, mx = Math.max(...data)+0.5, rng=mx-mn||1;
  const pts = data.map((v,i)=>`${(i/(data.length-1))*w},${h-((v-mn)/rng)*(h-4)+2}`).join(' ');
  const tY = target ? h-((target-mn)/rng)*(h-4)+2 : null;
  return (
    <svg width={w} height={h} style={{overflow:'visible'}}>
      <defs>
        <linearGradient id={`lc${color.replace('#','')}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.35"/>
          <stop offset="100%" stopColor={color} stopOpacity="0"/>
        </linearGradient>
      </defs>
      <polygon points={`0,${h} ${pts} ${w},${h}`} fill={`url(#lc${color.replace('#','')})`}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"
        style={{filter:`drop-shadow(0 0 4px ${color}88)`}}/>
      {tY && <>
        <line x1="0" y1={tY} x2={w} y2={tY} stroke={color} strokeWidth="1" strokeDasharray="4 3" opacity="0.5"/>
        <text x={w-2} y={tY-3} fontSize="8" fill={color} textAnchor="end" opacity="0.8">{targetLabel}</text>
      </>}
      {/* Last value dot */}
      <circle cx={w} cy={h-((data[data.length-1]-mn)/rng)*(h-4)+2} r="3" fill={color}
        style={{filter:`drop-shadow(0 0 6px ${color})`}}/>
    </svg>
  );
};

  const [saved, setSaved] = React.useState(false);
  const send = sendCmd || (()=>{});

  // Sync offsets from ESP32 when calib data arrives
  React.useEffect(() => {
    if (calib.sht45_t !== undefined) setOffsets({
      sht45T: calib.sht45_t || 0,
      sht45H: calib.sht45_h || 0,
      scd41T: calib.scd41_t || 0,
      scd41H: calib.scd41_h || 0,
    });
  }, [calib.sht45_t]);

  const save = () => {
    send({calib_cmd:'save',
      sht45_temp: offsets.sht45T, sht45_hum: offsets.sht45H,
      scd41_temp: offsets.scd41T, scd41_hum: offsets.scd41H});

  const send = sendCmd || (()=>{});
  const day = state?.day || 0;
  const totalDays = params.duration;
  const ep = state?.incubEpoch || 0;
  const fmtDate = (epochSec, offsetDays=0) => {
    if (!epochSec) return '--/--/----';
    const d = new Date((epochSec + offsetDays * 86400) * 1000);
    return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
  };
  const phases = [

var mqttClient = null, mqttConnected = false;
var mqttCFG = {
  url:   "wss://b372f5263631499b908210a0b354d18b.s1.eu.hivemq.cloud:8884/mqtt",

  pass:  "Moad.351969",
  state: "couveuse/etat",

};

// Détection local vs distant
var IS_LOCAL = (function(){
  var h = window.location.hostname;
  return h === 'localhost' || h === '127.0.0.1' || h.endsWith('.local')
      || /^192\.168\./.test(h) || /^10\./.test(h) || /^172\.(1[6-9]|2\d|3[01])\./.test(h);
})();

// ─── MAIN APP ────────────────────────────────────────────────────
const App = () => {
  const [screen, setScreen] = React.useState('dashboard');
  const [menuOpen, setMenuOpen] = React.useState(false);
  const [tweaksVisible, setTweaksVisible] = React.useState(false);
  const [mqttStatus, setMqttStatus] = React.useState('⚫ Connexion...');
  const [params, setParams] = React.useState({
    tempTarget:37.5, tempMargin:0.3, humTarget:60, humMargin:2,
    co2Max:2000, duration:21, turnInterval:60, eclosionDay:18,
    humEclosion:70, motorMs:5000, telegram:true, alertCO2:true, screensaver:'5min'
  });

  // Données live depuis ESP32
  const [liveTemp, setLiveTemp] = React.useState(0);
  const [liveHum,  setLiveHum]  = React.useState(0);
  const [liveCo2,  setLiveCo2]  = React.useState(0);
  const [time, setTime] = React.useState('--:--:--');
  const [date, setDate] = React.useState('--/--/----');
  const [espData, setEspData] = React.useState(null);

  // Historique local 30 points
  const [histTemp, setHistTemp] = React.useState([]);
  const [histHum,  setHistHum]  = React.useState([]);
  const [histCo2,  setHistCo2]  = React.useState([]);

  // Appliquer les données reçues (MQTT ou HTTP)
  const applyData = React.useCallback((d) => {
    setEspData(d);
    setLiveTemp(d.temp || 0);
    setLiveHum (d.hum  || 0);
    setLiveCo2 (d.co2  || 0);
    if (d.time) setTime(d.time);
    if (d.date) setDate(d.date);
    setHistTemp(h => [...h.slice(-29), d.temp]);
    setHistHum (h => [...h.slice(-29), d.hum]);
    setHistCo2 (h => [...h.slice(-29), d.co2]);
    if (d.temp_target) setParams(p => ({...p,
      tempTarget:  d.temp_target,
      tempMargin:  d.temp_margin || p.tempMargin,
      humTarget:   d.hum_target,
      humMargin:   d.hum_margin  || p.humMargin,
      co2Max:      d.co2_alarm,
      turnInterval:d.motor ? d.motor.interval_min : p.turnInterval,
      motorMs:     d.motor?.travel_ms || p.motorMs,
      duration:    d.incub ? d.incub.total_days   : p.duration,
      eclosionDay: d.incub ? d.incub.eclos_day    : p.eclosionDay,
    }));
  }, []);

  // Fetch HTTP local
  const fetchLocal = React.useCallback(() => {
    fetch('/data')
      .then(r => r.json())
      .then(applyData)
      .catch(() => {});
  }, [applyData]);

  // Connexion MQTT
  React.useEffect(() => {
    if (IS_LOCAL) {
      setMqttStatus('🔵 Mode local');
      fetchLocal();
      const id = setInterval(fetchLocal, 2000);
      return () => clearInterval(id);
    } else {
      // Mode distant : MQTT
      fetchLocal();
      const httpId = setInterval(() => { if (!mqttConnected) fetchLocal(); }, 2000);

      const script = document.createElement('script');
      script.src = 'https://unpkg.com/mqtt/dist/mqtt.min.js';
      script.onload = () => {
        setMqttStatus('🟡 Connexion MQTT...');
        mqttClient = window.mqtt.connect(mqttCFG.url, {
          username: mqttCFG.user, password: mqttCFG.pass,
          clientId: 'dash_' + Math.random().toString(16).slice(2),
          reconnectPeriod: 5000, connectTimeout: 10000, clean: true
        });
        mqttClient.on('connect', () => {
          mqttConnected = true;
          setMqttStatus('🟢 MQTT Connecté');
          mqttClient.subscribe(mqttCFG.state, {qos:1});
        });
        mqttClient.on('message', (topic, payload) => {
          if (topic !== mqttCFG.state) return;
          try { applyData(JSON.parse(payload.toString())); } catch(e) {}
        });
        mqttClient.on('disconnect', () => { mqttConnected=false; setMqttStatus('🔴 Déconnecté'); });
        mqttClient.on('reconnect',  () => { mqttConnected=false; setMqttStatus('🟡 Reconnexion...'); });
        mqttClient.on('error',      () => { mqttConnected=false; setMqttStatus('🔴 Erreur MQTT'); });
        mqttClient.on('close',      () => { mqttConnected=false; setMqttStatus('🔴 Fermé'); });
      };
      document.head.appendChild(script);
      return () => { clearInterval(httpId); if(mqttClient) mqttClient.end(); };
    }
  }, [fetchLocal, applyData]);

  // Envoi commande MQTT ou HTTP
  const sendCmd = React.useCallback((payload) => {
    const body = JSON.stringify(payload);
    if (mqttConnected && mqttClient) {
      mqttClient.publish(mqttCFG.cmd, body, {qos:1});
      return;
    }
    const isTarget = (payload.temp!==undefined || payload.hum!==undefined || payload.co2!==undefined)
      && payload.motor_cmd===undefined && payload.trappe_cmd===undefined
      && payload.fan_cmd===undefined && payload.light_cmd===undefined;
    fetch(isTarget ? '/set' : '/cmd', {
      method:'POST', headers:{'Content-Type':'application/json'}, body
    }).catch(()=>{});
  }, []);

  // Construction du state pour les composants
  const d = espData || {};
  const state = {
    temp: liveTemp, hum: liveHum, co2: liveCo2,
    tempHistory: histTemp, humHistory: histHum, co2History: histCo2,
    heat:      d.heat_on   || false,
    humid:     d.humid_on  || false,
    water:     d.water_ok  !== false,
    door:      d.door_ok   !== false,
    fan:       d.fan    ? d.fan.speed    : 0,
    servoOpen: d.trappe ? d.trappe.open  : false,
    motorDir:  d.motor  ? d.motor.dir    : 'STOP',
    turnCount: d.turn_count || 0,
    turnRemaining: d.motor ? (d.motor.next_turn_s || d.motor.interval_min * 60) : 0,
    lastTurnEpoch: d.motor ? (d.motor.last_turn_epoch || 0) : 0,
    day:       d.incub  ? d.incub.day    : 0,
    daysLeft:  d.incub  ? d.incub.days_left  : 0,
    totalDays: d.incub  ? d.incub.total_days : 21,
    eclosDay:  d.incub  ? d.incub.eclos_day  : 18,
    incubEpoch:d.incub  ? d.incub.epoch      : 0,
    heatPct:   d.incub  ? d.incub.heat_pct   : 0,
    humidPct:  d.incub  ? d.incub.humid_pct  : 0,
    tempMin: d.stats?.tmin   || 0,
    tempMax: d.stats?.tmax   || 0,
    humMin:  d.stats?.hmin   || 0,
    humMax:  d.stats?.hmax   || 0,
    co2Min:  d.stats?.co2min || 0,
    co2MaxStat: d.stats?.co2max || 0,
    heatTime:  d.stats?.heat_time  || '--:--:--',
    humidTime: d.stats?.humid_time || '--:--:--',
    alarmLog:  d.alarms  || [],
    calib:     d.calib   || {},
    trappe:    d.trappe  || {},
    params, sendCmd, mqttStatus,
  };

  // Tweaks setup
  React.useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode') setTweaksVisible(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksVisible(false);
    });
    window.parent.postMessage({type:'__edit_mode_available'},'*');
  }, []);

  return (
    <div style={{width:1024,height:600,background:C.bg,display:'flex',flexDirection:'column',position:'relative',overflow:'hidden'}}>
      <style>{`
        @keyframes pulse { 0%,100%{opacity:0.4} 50%{opacity:1} }
        @keyframes spinFan { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes airflow { 0%{opacity:0;transform:translateY(-4px)} 50%{opacity:0.8} 100%{opacity:0;transform:translateY(4px)} }
        @keyframes flamePulse { from{transform:scaleX(0.8) scaleY(0.9);opacity:0.1} to{transform:scaleX(1.2) scaleY(1.1);opacity:0.25} }
        @keyframes flameWobble { from{transform:rotate(-4deg) scaleY(0.96)} to{transform:rotate(4deg) scaleY(1.04)} }
        @keyframes dropFall { 0%{opacity:0;transform:translateY(-6px)} 30%{opacity:0.8} 100%{opacity:0;transform:translateY(8px)} }
        @keyframes dropPulse { from{filter:drop-shadow(0 0 4px #3898e888)} to{filter:drop-shadow(0 0 12px #3898e8cc)} }
        @keyframes bubble { 0%{opacity:0;transform:translateY(0) scale(0.5)} 40%{opacity:0.7} 100%{opacity:0;transform:translateY(-28px) scale(1.2)} }
        @keyframes eggRock { 0%,100%{transform:rotate(-22deg)} 50%{transform:rotate(22deg)} }
        @keyframes eggSettle { 0%{transform:rotate(22deg)} 100%{transform:rotate(0deg)} }
        @keyframes shimmer { 0%{opacity:0.4;transform:translateX(-100%)} 100%{opacity:0;transform:translateX(100%)} }
        ::-webkit-scrollbar{width:4px;background:transparent}
        ::-webkit-scrollbar-thumb{background:#2a3848;border-radius:2px}
      `}</style>
      <TopBar time={time} date={date} wifi={mqttConnected || IS_LOCAL} onMenu={()=>setMenuOpen(true)} alarm={false}/>
      {/* Statut MQTT */}
      <div style={{background:'#0f1318',borderBottom:'1px solid #1e2630',padding:'2px 16px',
        fontSize:11,color:'#5a6e82',display:'flex',alignItems:'center',gap:8}}>
        <span>{state.mqttStatus}</span>
        {!IS_LOCAL && <span style={{marginLeft:'auto',fontSize:10}}>HiveMQ Cloud</span>}
      </div>
      <div style={{flex:1,overflow:'hidden'}}>
        {screen==='dashboard' && <Dashboard state={state} onNavigate={setScreen}/>}
        {screen==='settings'  && <SettingsScreen onBack={()=>setScreen('dashboard')} params={params} setParams={setParams} sendCmd={sendCmd}/>}
        {screen==='motor'     && <MotorScreen onBack={()=>setScreen('dashboard')} state={state}/>}
        {screen==='stats'     && <StatsScreen onBack={()=>setScreen('dashboard')} state={state}/>}
        {screen==='fan'       && <FanScreen onBack={()=>setScreen('dashboard')} state={state} setState={()=>{}}/>}
        {screen==='trappe'    && <FanScreen onBack={()=>setScreen('dashboard')} state={state} setState={()=>{}}/>}
        {screen==='lights'    && <LightsScreen onBack={()=>setScreen('dashboard')} sendCmd={sendCmd}/>}
        {screen==='wifi'      && <WiFiScreen onBack={()=>setScreen('dashboard')}/>}
        {screen==='calib'     && <CalibScreen onBack={()=>setScreen('dashboard')} sendCmd={sendCmd} state={state}/>}
        {screen==='targets'   && <TargetsScreen onBack={()=>setScreen('dashboard')} params={params} setParams={setParams} sendCmd={sendCmd} state={state}/>}
        {screen==='graph'     && <StatsScreen onBack={()=>setScreen('dashboard')} state={state}/>}
        {screen==='reboot_log'&& <StatsScreen onBack={()=>setScreen('dashboard')} state={state}/>}
      </div>
      {menuOpen && <MenuPopup onClose={()=>setMenuOpen(false)} onNavigate={s=>{setScreen(s);setMenuOpen(false);}}/>}

      {/* TWEAKS PANEL */}
      <div className={`tweaks-panel ${tweaksVisible?'visible':''}`}>
        <h4>Tweaks</h4>
        <div className="tweaks-row"><label>Thème</label><div className="tweaks-toggle"><button className="active">Sombre</button><button>Clair</button></div></div>
